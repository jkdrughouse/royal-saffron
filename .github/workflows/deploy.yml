name: Deploy to cPanel + Purge Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Next.js Standalone
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Prepare deployment folder
        run: |
          echo "📂 Verifying standalone output..."
          if [ ! -d ".next/standalone" ]; then
            echo "❌ .next/standalone directory not found!"
            exit 1
          fi

          echo "📁 Assembling deploy folder..."
          mkdir -p deploy
          cp -r .next/standalone/. deploy/
          cp -r public deploy/public
          cp -r .next/static deploy/.next/static

          echo "✅ Deploy folder ready. Size: $(du -sh deploy | cut -f1)"
          ls deploy/

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: jkc-standalone
          path: deploy/
          retention-days: 3

  # ── 2. Deploy via FTP ────────────────────────────────────────────────────
  # Secrets needed (set in GitHub → Settings → Secrets → Actions):
  #   CPANEL_FTP_HOST  → your FTP hostname (e.g. jhelumkesarco.com)
  #   CPANEL_FTP_USER  → FTP username
  #   CPANEL_FTP_PASS  → FTP password
  deploy:
    name: Deploy to cPanel (FTP)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: jkc-standalone
          path: deploy/

      - name: Create Passenger restart trigger
        run: |
          mkdir -p deploy/tmp
          touch deploy/tmp/restart.txt
          echo "$(date -u)" > deploy/tmp/restart.txt

      - name: Deploy via lftp
        env:
          FTP_USER: ${{ secrets.CPANEL_FTP_USER }}
          FTP_PASS: ${{ secrets.CPANEL_FTP_PASS }}
          FTP_HOST: ${{ secrets.CPANEL_FTP_HOST }}
        run: |
          # Install lftp
          sudo apt-get update
          sudo apt-get install -y lftp

          # Sync using lftp
          # -R: reverse (upload)
          # -e: delete remote files that don't exist locally
          # -v: verbose
          # -p: allow partial
          lftp -c "set ftp:ssl-allow no;
          open -u $FTP_USER,$FTP_PASS $FTP_HOST;
          mirror -R -e -v --parallel=10 deploy/ jkc_app/"

  # ── 3. Purge Cloudflare Cache ────────────────────────────────────────────
  purge-cache:
    name: Purge Cloudflare Cache
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Purge all cached files
        run: |
          echo "🧹 Purging Cloudflare cache..."
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged"
          else
            echo "⚠️  Cache purge failed (non-fatal)"
          fi

      - name: Summary
        run: |
          echo ""
          echo "🚀 Deploy complete — https://jhelumkesarco.com"
          echo "   Commit : ${{ github.sha }}"
          echo "   By     : ${{ github.actor }}"
