name: Deploy to cPanel + Purge Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── 1. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build Next.js Standalone
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Package standalone bundle
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static
          cd .next/standalone
          zip -r ../../jkc-deploy.zip . -x "*.map"
          cd ../..
          echo "📦 Bundle: $(du -sh jkc-deploy.zip | cut -f1)"

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: jkc-standalone
          path: jkc-deploy.zip
          retention-days: 3

  # ── 2. Deploy via FTP + SSH restart ──────────────────────────────────────
  # Secrets needed:
  #   CPANEL_FTP_HOST  → jhelumkesarco.com
  #   CPANEL_FTP_USER  → deploy@jhelumkesarco.com
  #   CPANEL_FTP_PASS  → GhDeploy@2024JKC!
  #   SSH_HOST         → server902.shared.spaceship.host (or jhelumkesarco.com)
  #   SSH_USER         → unodtykawc
  #   SSH_PRIVATE_KEY  → your private key (generate below)
  deploy:
    name: Deploy to cPanel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artefact
        uses: actions/download-artifact@v4
        with:
          name: jkc-standalone

      - name: Upload bundle via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_HOST }}
          username: ${{ secrets.CPANEL_FTP_USER }}
          password: ${{ secrets.CPANEL_FTP_PASS }}
          local-dir: ./
          server-dir: /jkc_upload/
          dry-run: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.md

      - name: Extract bundle & restart app via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          script: |
            set -e
            echo "📂 Extracting new build..."
            mkdir -p ~/jkc_app
            cd ~/
            unzip -o ~/jkc_upload/jkc-deploy.zip -d ~/jkc_app_new
            rsync -a --delete ~/jkc_app_new/ ~/jkc_app/
            rm -rf ~/jkc_app_new ~/jkc_upload/jkc-deploy.zip

            echo "🔄 Restarting Node.js app..."
            # Try cPanel Node.js App restart (passenger-based)
            if command -v passengerkillall &> /dev/null; then
              passengerkillall
              echo "✅ App restarted via Passenger"
            elif [ -f ~/jkc_app/tmp/restart.txt ]; then
              touch ~/jkc_app/tmp/restart.txt
              echo "✅ App restarted via restart.txt"
            else
              # Create restart trigger for Passenger
              mkdir -p ~/jkc_app/tmp
              touch ~/jkc_app/tmp/restart.txt
              echo "✅ Restart trigger created"
            fi

  # ── 3. Purge Cloudflare Cache ────────────────────────────────────────────
  purge-cache:
    name: Purge Cloudflare Cache
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Purge all cached files
        run: |
          echo "🧹 Purging Cloudflare cache..."
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "$RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✅ Cloudflare cache purged"
          else
            echo "❌ Cache purge failed"
            exit 1
          fi

      - name: Summary
        run: |
          echo ""
          echo "🚀 Deploy complete — https://jhelumkesarco.com"
          echo "   Commit : ${{ github.sha }}"
          echo "   By     : ${{ github.actor }}"
